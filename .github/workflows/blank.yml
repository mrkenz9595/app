name: Auto Scan APKs and Update JSON
on:
  release:
    types: [published, edited]
  workflow_dispatch:

jobs:
  scan-apks:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Dependencies
        run: |
          pip install androguard requests

      - name: Process Release APKs
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RELEASE_ASSETS_URL: ${{ github.event.release.assets_url || format('{0}/repos/{1}/releases/latest', github.api_url, github.repository) }}
        shell: python
        run: |
          import os
          import json
          import requests
          from androguard.core.apk import APK

          headers = {"Authorization": f"token {os.environ['GITHUB_TOKEN']}"}
          assets_url = os.environ['RELEASE_ASSETS_URL']
          
          response = requests.get(assets_url, headers=headers)
          release_data = response.json()
          
          if isinstance(release_data, dict) and "assets" in release_data:
              assets = release_data["assets"]
          elif isinstance(release_data, list):
              assets = release_data
          else:
              assets = release_data.get("assets", []) if isinstance(release_data, dict) else []

          current_release_apk_files = {asset['name'] for asset in assets if asset['name'].endswith('.apk')}
          print(f"Các file APK hiện có trên Release: {current_release_apk_files}")

          json_file_path = "version.json"
          if os.path.exists(json_file_path):
              with open(json_file_path, "r", encoding="utf-8") as f:
                  try:
                      app_list = json.load(f)
                  except Exception:
                      app_list = []
          else:
              app_list = []

          filtered_app_list = []
          for app in app_list:
              if app.get('fileName') in current_release_apk_files:
                  filtered_app_list.append(app)
              else:
                  print(f"Đã phát hiện file bị xóa khỏi Release, đang gỡ khỏi JSON: {app.get('fileName')}")

          app_dict = {app['packageName']: app for app in filtered_app_list}

          for asset in assets:
              file_name = asset['name']
              if file_name.endswith('.apk'):
                  download_url = asset['browser_download_url']
                  print(f"Đang xử lý file: {file_name}...")
                  
                  with requests.get(download_url, stream=True) as r:
                      r.raise_for_status()
                      with open(file_name, "wb") as f:
                          for chunk in r.iter_content(chunk_size=8192):
                              f.write(chunk)

                  try:
                      apk = APK(file_name)
                      package_name = apk.package_name
                      version_code = int(apk.version_code)
                      version_name = apk.version_name
                      
                      app_dict[package_name] = {
                          "packageName": package_name,
                          "versionCode": version_code,
                          "versionName": version_name,
                          "fileName": file_name,
                          "apkUrl": download_url
                      }
                      print(f"Thành công: {package_name} (Code: {version_code})")
                  except Exception as e:
                      print(f"Lỗi khi đọc file {file_name}: {e}")
                  finally:
                      if os.path.exists(file_name):
                          os.remove(file_name)

          new_app_list = list(app_dict.values())
          with open(json_file_path, "w", encoding="utf-8") as f:
              json.dump(new_app_list, f, indent=2, ensure_ascii=False)

      - name: Commit and Push changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@://github.com"
          git add version.json
          git diff-index --quiet HEAD || (git commit -m "Auto-update version.json from Release (Sync Add/Delete)" && git push)
