name: Auto Scan APKs and Update JSON
on:
  release:
    types: [published, edited]
  workflow_dispatch:

jobs:
  scan-apks:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install Dependencies
        run: |
          pip install "androguard>=4.0.0" requests

      - name: Process Release APKs
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RELEASE_ASSETS_URL: ${{ github.event.release.assets_url || format('{0}/repos/{1}/releases/latest', github.api_url, github.repository) }}
          # Lấy tên Tag hiện tại của Release (hoặc mặc định lấy phiên bản mới nhất nếu chạy thủ công)
          RELEASE_TAG: ${{ github.event.release.tag_name || 'latest' }}
          REPOSITORY: ${{ github.repository }}
        shell: python
        run: |
          import os
          import json
          import requests
          from androguard.core.apk import APK

          headers = {
              "Authorization": f"token {os.environ['GITHUB_TOKEN']}",
              "Accept": "application/vnd.github.v3+json"
          }
          assets_url = os.environ['RELEASE_ASSETS_URL']
          repo_name = os.environ['REPOSITORY']
          
          # Lấy tag chuẩn của release
          tag_name = os.environ['RELEASE_TAG']
          if tag_name == 'latest':
              # Nếu chạy workflow_dispatch thủ công, lấy tag thực tế từ API của latest release
              try:
                  latest_url = assets_url.replace('/assets', '') if '/assets' in assets_url else assets_url
                  rel_resp = requests.get(latest_url, headers=headers)
                  tag_name = rel_resp.json().get('tag_name', 'main')
              except Exception:
                  tag_name = 'main'
          
          print(f"Fetching assets from: {assets_url} (Tag: {tag_name})")
          response = requests.get(assets_url, headers=headers)
          response.raise_for_status()
          release_data = response.json()

          if isinstance(release_data, dict):
              assets = release_data.get("assets", [])
          elif isinstance(release_data, list):
              assets = release_data
          else:
              assets = []

          current_release_apk_files = {asset['name'] for asset in assets if asset['name'].endswith('.apk')}
          print(f"Các file APK hiện có trên Release: {current_release_apk_files}")

          json_file_path = "version.json"
          if os.path.exists(json_file_path):
              with open(json_file_path, "r", encoding="utf-8") as f:
                  try:
                      app_list = json.load(f)
                  except Exception:
                      app_list = []
          else:
              app_list = []

          filtered_app_list = []
          for app in app_list:
              if app.get('fileName') in current_release_apk_files:
                  filtered_app_list.append(app)
              else:
                  print(f"Đã gỡ file khỏi JSON do không thấy trên Release: {app.get('fileName')}")

          app_dict = {app['packageName']: app for app in filtered_app_list}

          for asset in assets:
              file_name = asset['name']
              if file_name.endswith('.apk'):
                  download_url = asset['browser_download_url']
                  print(f"Đang quét file: {file_name}...")
                  
                  try:
                      with requests.get(download_url, stream=True) as r:
                          r.raise_for_status()
                          with open(file_name, "wb") as f:
                              for chunk in r.iter_content(chunk_size=8192):
                                  f.write(chunk)

                      apk = APK(file_name)
                      package_name = str(apk.get_package())
                      version_code = int(apk.get_androidversion_code())
                      version_name = str(apk.get_androidversion_name())

                      # ĐỔI THÀNH LINK CDN JSDELIVR DÀNH CHO RELEASES
                      # Cấu trúc chuẩn: https://jsdelivr.net
                      jsdelivr_url = f"https://jsdelivr.net{repo_name}@{tag_name}/{file_name}"

                      app_dict[package_name] = {
                          "packageName": package_name,
                          "versionCode": version_code,
                          "versionName": version_name,
                          "fileName": file_name,
                          "apkUrl": jsdelivr_url # Ghi link CDN vào JSON
                      }
                      print(f"Quét thành công và ghi nhận: {package_name} (Phiên bản: {version_name} - Link CDN: {jsdelivr_url})")
                  except Exception as e:
                      print(f"Lỗi phân tích file {file_name}: {e}")
                  finally:
                      if os.path.exists(file_name):
                          os.remove(file_name)

          new_app_list = list(app_dict.values())
          with open(json_file_path, "w", encoding="utf-8") as f:
              json.dump(new_app_list, f, indent=2, ensure_ascii=False)

      - name: Commit and Push changes
        id: push_changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add version.json
          if git diff-index --quiet HEAD; then
            echo "changed=false" >> $GITHUB_OUTPUT
          else
            git commit -m "Auto-update version.json from Release (Sync Add/Delete)"
            git push
            echo "changed=true" >> $GITHUB_OUTPUT
          fi

      - name: Purge jsDelivr Cache for version.json
        # Bước này chỉ chạy khi file version.json thực sự có thay đổi và đã push lên nhánh thành công
        if: steps.push_changes.outputs.changed == 'true'
        run: |
          # Đổi 'main' thành tên nhánh chứa file version.json của bạn nếu bạn dùng nhánh khác (ví dụ: master)
          curl -X POST "https://jsdelivr.net{{ github.repository }}@main/version.json"
