name: Auto Scan APKs and Update JSON

on:
  release:
    types: [published]

jobs:
  scan-apks:
    runs-on: ubuntu-latest
    permissions:
      contents: write # Cần quyền để push file json lên repo

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: master

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.x'

      - name: Install Dependencies
        run: |
          pip install androguard requests

      - name: Process Release APKs
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          RELEASE_ASSETS_URL: ${{ github.event.release.assets_url }}
        python: |
          import os
          import json
          import requests
          from androguard.core.bytecodes.apk import APK

          # 1. Lấy danh sách tất cả các assets từ Release hiện tại
          headers = {"Authorization": f"token {os.environ['GITHUB_TOKEN']}"}
          response = requests.get(os.environ['RELEASE_ASSETS_URL'], headers=headers)
          assets = response.json()

          # Đọc file version.json cũ nếu có, nếu không thì tạo list rỗng
          json_file_path = "version.json"
          if os.path.exists(json_file_path):
              with open(json_file_path, "r") as f:
                  try:
                      app_list = json.load(f)
                  except:
                      app_list = []
          else:
              app_list = []

          # Chuyển app_list thành dict với key là packageName để dễ cập nhật/xóa
          app_dict = {app['packageName']: app for app in app_list}

          # 2. Lọc ra các file .apk và xử lý
          for asset in assets:
              file_name = asset['name']
              if file_name.endswith('.apk'):
                  download_url = asset['browser_download_url']
                  print(f"Đang xử lý file: {file_name}...")

                  # Tải file APK tạm thời về để đọc thông tin
                  apk_data = requests.get(download_url).content
                  with open(file_name, "wb") as f:
                      f.write(apk_data)

                  try:
                      # Dùng androguard để phân tích file APK
                      apk = APK(file_name)
                      package_name = apk.get_package()
                      version_code = int(apk.get_androidversion_code())
                      version_name = apk.get_androidversion_name()

                      # Cập nhật hoặc thêm mới vào dict
                      app_dict[package_name] = {
                          "packageName": package_name,
                          "versionCode": version_code,
                          "versionName": version_name,
                          "fileName": file_name,
                          "apkUrl": download_url
                      }
                      print(f"Thành công: {package_name} (Code: {version_code})")
                  except Exception as e:
                      print(f"Lỗi khi đọc file {file_name}: {e}")
                  finally:
                      # Xóa file APK tạm sau khi đọc xong để nhẹ ổ đĩa
                      if os.path.exists(file_name):
                          os.remove(file_name)

          # 3. Ghi lại dữ liệu mới vào file version.json
          new_app_list = list(app_dict.values())
          with open(json_file_path, "w", encoding="utf-8") as f:
              json.dump(new_app_list, f, indent=2, ensure_ascii=False)

      - name: Commit and Push changes
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@://github.com"
          git add version.json
          # Chỉ commit nếu file json có sự thay đổi
          git diff-index --quiet HEAD || (git commit -m "Auto-update version.json from Release" && git push origin master)
