name: Scan APKs and Update version.json

on:
  push:
    branches:
      - master
  workflow_dispatch:

jobs:
  scan-apks:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install "androguard>=4.0.0"

      - name: Scan APKs
        shell: python
        env:
          REPOSITORY: ${{ github.repository }}
        run: |
          import os
          import json
          import glob
          from androguard.core.apk import APK

          repo = os.environ["REPOSITORY"]

          app_list = []

          for apk_file in sorted(glob.glob("*.apk")):
              print(f"Scanning {apk_file}")

              try:
                  apk = APK(apk_file)

                  package_name = apk.get_package()
                  version_code = int(apk.get_androidversion_code())
                  version_name = apk.get_androidversion_name()

                  app_list.append({
                      "packageName": package_name,
                      "versionCode": version_code,
                      "versionName": version_name,
                      "fileName": apk_file,
                      "apkUrl": f"https://cdn.jsdelivr.net/gh/{repo}@master/{apk_file}"
                  })

                  print(f"OK: {package_name}")

              except Exception as e:
                  print(f"Skip {apk_file}: {e}")

          app_list.sort(key=lambda x: x["packageName"])

          with open("version.json", "w", encoding="utf-8") as f:
              json.dump(app_list, f, indent=2, ensure_ascii=False)

      - name: Commit changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          git add version.json

          if git diff --cached --quiet; then
            echo "Nothing changed."
            exit 0
          fi

          git commit -m "Update version.json"
          git push

      - name: Purge jsDelivr cache
        run: |
          curl -X POST \
          "https://purge.jsdelivr.net/gh/${{ github.repository }}@master/version.json"
